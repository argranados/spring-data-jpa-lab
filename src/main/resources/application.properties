spring.application.name=e-commerce-lab
server.port = 9090

spring.datasource.url=jdbc:postgresql://localhost:5438/e-commerce
spring.datasource.username=e-commerce_user
spring.datasource.password=e-commerce_pass

spring.jpa.hibernate.ddl-auto=update
spring.jpa.show-sql=true
spring.jpa.properties.hibernate.format_sql=true
spring.jpa.open-in-view=false

# management.endpoints.web.exposure.include=health,info
# management.endpoint.health.show-details=always

#logging.level.org.hibernate.SQL=DEBUG al parecer esta es lo mismo que spring.jpa.show-sql=true
logging.level.org.hibernate.orm.jdbc.bind=TRACE